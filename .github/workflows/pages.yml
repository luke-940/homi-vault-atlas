name: Build and deploy Atlas

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          ATLAS_PUBLIC_AUDIT_CONTEXT: public-ci
          ATLAS_PUBLIC_AUDIT_DIR: artifacts/publication
          ATLAS_PUBLIC_AUDIT_RECEIPT: v7-3-publication-audit.json
      - name: Create and verify the commit-bound release bundle
        run: npm run release:package && npm run release:verify
        env:
          ATLAS_SOURCE_COMMIT: ${{ github.sha }}
      - name: Retain the exact Pages build and release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atlas-v7-3-pages-build-${{ github.sha }}
          path: |
            dist-public
            artifacts/publication
            artifacts/release
          if-no-files-found: error
          retention-days: 30
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist-public

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  production-readback:
    name: Production byte readback
    runs-on: ubuntu-latest
    needs: [build, deploy]
    timeout-minutes: 12
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Download the commit-bound Pages build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: atlas-v7-3-pages-build-${{ github.sha }}
          path: readback-evidence
      - name: Compare production JSON, JavaScript, snapshot digest, and Agency route shell
        run: node scripts/readback-production.mjs
        env:
          ATLAS_PRODUCTION_URL: ${{ needs.deploy.outputs.page_url }}
          ATLAS_SOURCE_COMMIT: ${{ github.sha }}
          ATLAS_PUBLIC_OUTPUT_DIR: ${{ github.workspace }}/readback-evidence/dist-public
          ATLAS_RELEASE_ARTIFACT_DIR: ${{ github.workspace }}/readback-evidence/artifacts/release
          ATLAS_READBACK_RECEIPT: ${{ github.workspace }}/artifacts/production-readback/v7-3-production-readback.json
      - name: Retain the production readback receipt
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atlas-v7-3-production-readback-${{ github.sha }}
          path: artifacts/production-readback/v7-3-production-readback.json
          if-no-files-found: warn
          retention-days: 90
