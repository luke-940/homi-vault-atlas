name: Atlas Public Contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: atlas-public-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  atlas-public-contract:
    name: Atlas Public Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          ATLAS_PUBLIC_AUDIT_CONTEXT: public-ci
          ATLAS_PUBLIC_AUDIT_DIR: artifacts/publication
          ATLAS_PUBLIC_AUDIT_RECEIPT: v7-2-publication-audit.json
