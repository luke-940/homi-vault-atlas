name: Atlas Public Contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: atlas-public-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  atlas-public-contract:
    name: Atlas Public Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 36
    steps:
      - name: Check out the exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run the serial unit and release-contract suite once
        run: npm run test:public
      - name: Build and audit the only deployable public profile
        run: npm run build
        env:
          ATLAS_PUBLIC_AUDIT_CONTEXT: public-ci
          ATLAS_PUBLIC_AUDIT_DIR: artifacts/publication
          ATLAS_PUBLIC_AUDIT_RECEIPT: v7-4-publication-audit.json
      - name: Install the two browser engines used by the one release QA matrix
        run: npx --no-install playwright install --with-deps chromium webkit
      - name: Run the single serial v7.6 browser QA stage and prove shutdown
        shell: bash
        env:
          ATLAS_QA_MODE: ci
          ATLAS_URL: http://127.0.0.1:4173/
          ATLAS_QA_ARTIFACT_DIR: artifacts/v7-6-browser-qa
        run: |
          set -euo pipefail
          mkdir -p artifacts/v7-6-browser-qa
          python3 -m http.server 4173 --bind 127.0.0.1 --directory dist-public \
            > artifacts/v7-6-browser-qa/static-server.log 2>&1 &
          server_pid="$!"
          cleanup() {
            if [[ -n "${server_pid:-}" ]]; then
              kill "${server_pid}" 2>/dev/null || true
              wait "${server_pid}" 2>/dev/null || true
              server_pid=""
            fi
            node --input-type=module -e '
              import { writeFileSync } from "node:fs";
              import { createConnection } from "node:net";
              await new Promise((resolve, reject) => {
                const socket = createConnection({ host: "127.0.0.1", port: 4173 });
                socket.once("connect", () => {
                  socket.destroy();
                  reject(new Error("Atlas CI server remained reachable after shutdown"));
                });
                socket.once("error", (error) => {
                  if (error.code !== "ECONNREFUSED") reject(error);
                  else resolve();
                });
              });
              writeFileSync(
                "artifacts/v7-6-browser-qa/server-shutdown.json",
                `${JSON.stringify({ pass: true, host: "127.0.0.1", port: 4173, status: "ECONNREFUSED" }, null, 2)}\n`,
              );
            '
          }
          trap cleanup EXIT
          for attempt in {1..50}; do
            if curl --fail --silent --show-error "${ATLAS_URL}" >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl --fail --silent --show-error "${ATLAS_URL}" >/dev/null
          npm run qa:ci
          cleanup
          trap - EXIT
      - name: Create and verify the commit-bound public release bundle
        run: npm run release:package && npm run release:verify
        env:
          ATLAS_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha }}
      - name: Bind the tested tree and every public byte
        shell: bash
        env:
          ATLAS_PR_NUMBER: ${{ github.event.pull_request.number }}
          ATLAS_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci-binding
          (
            cd dist-public
            find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum
          ) > artifacts/ci-binding/DIST_PUBLIC_SHA256SUMS
          ATLAS_HEAD_TREE="$(git rev-parse 'HEAD^{tree}')" node --input-type=module -e '
            import { writeFileSync } from "node:fs";
            const value = {
              schema: "homi.atlas_v7_4.ci_artifact_binding.v1",
              pullRequest: Number(process.env.ATLAS_PR_NUMBER),
              headSha: process.env.ATLAS_HEAD_SHA,
              testedTree: process.env.ATLAS_HEAD_TREE,
              publicRoot: "dist-public",
              checksumManifest: "artifacts/ci-binding/DIST_PUBLIC_SHA256SUMS",
            };
            writeFileSync("artifacts/ci-binding/binding.json", `${JSON.stringify(value, null, 2)}\n`);
          '
      - name: Upload the exact tested public artifact and QA evidence
        id: public-artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: atlas-public-${{ github.event.pull_request.head.sha }}
          path: |
            dist-public
            artifacts/publication
            artifacts/release
            artifacts/ci-binding
            artifacts/v7-6-browser-qa
          if-no-files-found: warn
          retention-days: 30
      - name: Record the immutable Actions artifact digest
        if: ${{ always() && steps.public-artifact.outputs.artifact-digest != '' }}
        run: echo "Atlas public artifact digest ${{ steps.public-artifact.outputs.artifact-digest }}" >> "$GITHUB_STEP_SUMMARY"
